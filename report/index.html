<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC 公司 — 營運週報</title>
<style>
  :root{
    --bg:#0f1729; --panel:#16203a; --panel2:#1d2a48; --line:#27375c;
    --txt:#e8edf7; --mut:#93a0bd; --accent:#4f8cff; --green:#2fc98a;
    --red:#ff6b6b; --amber:#ffb454; --purple:#a06bff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;font-size:14px;line-height:1.5}
  header{background:linear-gradient(120deg,#16203a,#1d2a48);padding:18px 26px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--purple));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  h1{font-size:18px;margin:0}
  .sub{color:var(--mut);font-size:12px}
  .wkpick{display:flex;align-items:center;gap:8px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:8px 12px;font-size:14px;cursor:pointer}
  .tabs{display:flex;gap:6px;padding:14px 26px 0;background:var(--bg);position:sticky;top:73px;z-index:9;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:9px 9px 0 0;background:var(--panel);color:var(--mut);
    cursor:pointer;border:1px solid var(--line);border-bottom:none;font-weight:600}
  .tab.active{background:var(--panel2);color:var(--txt)}
  main{padding:18px 26px 60px}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .label{color:var(--mut);font-size:12px;margin-bottom:6px}
  .kpi .val{font-size:25px;font-weight:800;letter-spacing:.5px}
  .kpi .delta{font-size:12px;margin-top:5px}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--mut)}
  .row{display:grid;gap:14px;grid-template-columns:1fr 1fr;margin-top:14px}
  @media(max-width:880px){.row{grid-template-columns:1fr}}
  .card h3{margin:0 0 12px;font-size:14px;display:flex;align-items:center;gap:8px}
  .card h3 .dot{width:8px;height:8px;border-radius:50%}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:12px;position:sticky;top:0;background:var(--panel)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{max-height:330px;overflow:auto}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .nm{width:120px;flex:none;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px}
  .bar-row .amt{width:96px;flex:none;text-align:right;color:var(--mut);font-variant-numeric:tabular-nums}
  .hide{display:none}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--panel2);color:var(--mut)}
  .foot{color:var(--mut);font-size:11px;margin-top:24px;border-top:1px solid var(--line);padding-top:14px}
  .axis{font-size:10px;fill:var(--mut)}
  .miniloss{color:var(--red)}
  /* ---- AI 洞見 按鈕 + 燈號 ---- */
  .card.kpi{position:relative}
  .card.kpi .label{padding-right:92px}
  .ins-btn{position:absolute;top:11px;right:11px;display:inline-flex;align-items:center;gap:5px;
    background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:20px;
    padding:3px 9px;font-size:11px;cursor:pointer;transition:.15s;font-family:inherit}
  .ins-btn:hover{color:var(--txt);border-color:var(--accent);background:#22325a}
  .ins-btn .sev{width:7px;height:7px;border-radius:50%}
  .sev-good{background:var(--green)} .sev-warn{background:var(--amber)} .sev-risk{background:var(--red)}
  /* ---- 洞見彈窗 ---- */
  .modal-bk{position:fixed;inset:0;background:rgba(6,11,22,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bk.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:640px;width:100%;
    max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;
    justify-content:space-between;gap:14px;position:sticky;top:0;background:var(--panel);z-index:1}
  .modal-hd .mt{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.5px}
  .modal-hd h2{margin:4px 0 0;font-size:19px}
  .modal-hd .metric-now{font-size:12.5px;color:var(--mut);margin-top:7px}
  .badge{font-size:12px;padding:4px 11px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
  .badge.good{background:rgba(47,201,138,.16);color:var(--green)}
  .badge.warn{background:rgba(255,180,84,.16);color:var(--amber)}
  .badge.risk{background:rgba(255,107,107,.16);color:var(--red)}
  .modal-x{cursor:pointer;color:var(--mut);font-size:20px;line-height:1;border:none;background:none}
  .modal-bd{padding:6px 22px 18px}
  .isec{margin-top:17px}
  .isec .ih{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:8px}
  .isec .ih .ic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
  .ic-a{background:rgba(79,140,255,.18)} .ic-b{background:rgba(255,180,84,.18)} .ic-c{background:rgba(47,201,138,.18)}
  .isec ul{margin:0;padding-left:19px} .isec li{margin:5px 0;line-height:1.55}
  .isec p{margin:0;line-height:1.7}
  .modal-foot{padding:2px 22px 20px;color:var(--mut);font-size:11px;line-height:1.5}
</style>
</head>

<header>
  <div class="brand">
    <div class="logo">ABC</div>
    <div><h1>ABC 公司 · 營運週報</h1><div class="sub" id="hdrsub">—</div></div>
  </div>
  <div class="wkpick">

    <select id="wksel"></select>
  </div>
</header>

<div class="tabs">

</div>

<main>
  <section id="sales"></section>
  <section id="purch" class="hide"></section>
  <section id="fin" class="hide"></section>
  <div class="foot" id="foot"></div>
</main>

<div class="modal-bk" id="modal">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="mt">🤖 AI 洞見 · 企業主視角</div>
        <h2 id="mTitle"></h2>
        <div class="metric-now" id="mNow"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">

        <span class="badge" id="mBadge"></span>
      </div>
    </div>
    <div class="modal-bd" id="mBody"></div>

</div>

// ---- aggregation helpers ----
function weekIndex(w){ return weeks.indexOf(w); }
function prevWeeksData(arr, w, n, field){
  // return last n weeks (incl w) totals as [{wk,total}]
  const i=weekIndex(w); const out=[];
  for(let k=Math.max(0,i-n+1);k<=i;k++){
    const wk=weeks[k];
    const t=arr.filter(r=>r.wk===wk).reduce((s,r)=>s+(r[field]||0),0);
    out.push({wk,total:t,start:weekMeta[wk]?.start});
  }
  return out;
}
function delta(cur,prev){
  if(!prev) return {cls:'flat',txt:'—'};
  const p=(cur-prev)/Math.abs(prev)*100;
  const cls=p>0.5?'up':p<-0.5?'down':'flat';
  const arw=p>0.5?'▲':p<-0.5?'▼':'■';
  return {cls,txt:`${arw} ${p>=0?'+':''}${p.toFixed(1)}% vs 上週`};
}
function rank(arr, keyf, namef, field, top=8){
  const m={};
  arr.forEach(r=>{const k=keyf(r); m[k]=m[k]||{name:namef(r),v:0,c:0}; m[k].v+=(r[field]||0); m[k].c++;});
  return Object.values(m).sort((a,b)=>b.v-a.v).slice(0,top);
}

// ---- chart builders (inline SVG, offline) ----
function lineChart(series, color, h=140){
  const w=420, pad=28; const max=Math.max(1,...series.map(d=>d.total));
  const n=series.length; const step=n>1?(w-pad*2)/(n-1):0;
  const pts=series.map((d,i)=>[pad+i*step, h-18-(d.total/max)*(h-34)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=path+` L ${pts[pts.length-1][0].toFixed(1)} ${h-18} L ${pts[0][0].toFixed(1)} ${h-18} Z`;
  let dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`).join('');
  let labs=series.map((d,i)=>{
    if(n>8 && i%2) return '';
    return `<text class="axis" x="${pad+i*step}" y="${h-4}" text-anchor="middle">${d.start?d.start.slice(5):d.wk.slice(5)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g${color.replace('#','')})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
    ${dots}${labs}</svg>`;
}
function dualLine(s1,s2,c1,c2,h=150){
  const w=420,pad=28; const all=s1.concat(s2).map(d=>d.total);
  const max=Math.max(1,...all); const n=s1.length; const step=n>1?(w-pad*2)/(n-1):0;
  function mk(series,color){
    const pts=series.map((d,i)=>[pad+i*step,h-18-(d.total/max)*(h-34)]);
    const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>`+
      pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.6" fill="${color}"/>`).join('');
  }
  let labs=s1.map((d,i)=>{ if(n>8&&i%2) return '';
    return `<text class="axis" x="${pad+i*step}" y="${h-4}" text-anchor="middle">${d.start?d.start.slice(5):d.wk.slice(5)}</text>`;}).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${mk(s1,c1)}${mk(s2,c2)}${labs}</svg>`;
}
function barlist(items, color, total){
  const max=Math.max(1,...items.map(d=>d.v));
  return items.map(d=>`<div class="bar-row"><div class="nm" title="${d.name}">${d.name}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(d.v/max*100).toFixed(1)}%;background:${color}"></div></div>
    <div class="amt">${fmt(d.v)}</div></div>`).join('');
}
function kpi(label,val,deltaObj,sub){
  const d=INS[label];

}

function wowPct(c,p){ return (p===0||p==null)?null:(c-p)/Math.abs(p)*100; }
function wowTxt(c,p){ const w=wowPct(c,p); return w==null?'無上週可比':`${w>=0?'成長':'衰退'} ${Math.abs(w).toFixed(1)}%`; }
function openIns(key){
  const d=INS[key]; if(!d) return;
  const sevLabel={good:'🟢 體質良好',warn:'🟡 需留意',risk:'🔴 警訊'}[d.sev];
  document.getElementById('mTitle').textContent=key;
  document.getElementById('mNow').innerHTML=d.now||'';
  const b=document.getElementById('mBadge'); b.className='badge '+d.sev; b.textContent=sevLabel;
  document.getElementById('mBody').innerHTML=
    `<div class="isec"><div class="ih"><span class="ic ic-a">🔍</span>問題分析</div><p>${d.analysis}</p></div>`+
    `<div class="isec"><div class="ih"><span class="ic ic-b">🧭</span>問題來源</div><p>${d.source}</p></div>`+
    `<div class="isec"><div class="ih"><span class="ic ic-c">✅</span>建議對策</div><ul>${d.action.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;
  document.getElementById('modal').classList.add('show');
}
function closeIns(){ document.getElementById('modal').classList.remove('show'); }
document.addEventListener('click',e=>{ const x=e.target.closest('.ins-btn'); if(x) openIns(x.dataset.ins); if(e.target.id==='modal') closeIns(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeIns(); });

function renderFin(){
  const s=DATA.sales.filter(r=>r.wk===curWeek);
  const p=DATA.purch.filter(r=>r.wk===curWeek);
  const ap=DATA.ap.filter(r=>r.wk===curWeek);
  const i=weekIndex(curWeek); const pw=i>0?weeks[i-1]:null;
  const sP=pw?DATA.sales.filter(r=>r.wk===pw):[], pP=pw?DATA.purch.filter(r=>r.wk===pw):[];
  const rev=s.reduce((a,r)=>a+r.amt,0), cost=p.reduce((a,r)=>a+r.amt,0);
  const revP=sP.reduce((a,r)=>a+r.amt,0), costP=pP.reduce((a,r)=>a+r.amt,0);
  const gp=rev-cost, gpP=revP-costP;
  const gm=rev? gp/rev*100:0, gmP=revP? gpP/revP*100:0;
  const apNew=ap.reduce((a,r)=>a+r.payable,0), apPaid=ap.reduce((a,r)=>a+r.paid,0);
  const revTrend=prevWeeksData(DATA.sales,curWeek,12,'amt');
  const costTrend=prevWeeksData(DATA.purch,curWeek,12,'amt');
  const gpcls=gp>=0?'up':'down';
  // ---- AI 洞見：財務 ----
  const revWow=wowPct(rev,revP), costWow=wowPct(cost,costP);
  const costRatio=rev?cost/rev*100:0; const net=rev-apPaid; const rc=cost?rev/cost:0;
  const sevRev=(revWow!=null&&revWow<=-10)?'risk':(revWow!=null&&revWow<-2)?'warn':'good';
  const sevCost=(costWow!=null&&costWow>15)?'warn':'good';
  const sevGp=gp<0?'risk':((gpP>0&&gp<gpP*0.8)?'warn':'good');
  const sevGm=gm<0?'risk':((gm<gmP-3)?'warn':'good');
  const sevApPay=(apNew>0&&apPaid<apNew*0.2)?'warn':'good';
  const sevCash=net<0?'risk':'good';
  INS['營業收入（銷貨未稅）']=ins(sevRev,
    `NT$${fmt(rev)}　·　${wowTxt(rev,revP)}`,
    `本週營業收入 NT$${fmt(rev)}，較上週${wowTxt(rev,revP)}。收入是獲利與現金流的源頭，其波動直接牽動毛利與週轉。`,
    `收入由銷貨單彙總而來；若集中於少數大單或大客戶，單週波動會放大（詳見『業績週報』客戶排行）。`,
    [ revWow!=null&&revWow<0?'追回失速訂單、加速報價轉換，穩住收入基本盤。':'把握成長動能，確保產能與交期跟上。',
      '以毛利而非只看營收接單，避免賠本衝量。',
      '建立收入滾動預測，連動採購與人力安排。' ]);

    `本週進貨成本 NT$${fmt(cost)}，占營業收入 ${costRatio.toFixed(0)}%，較上週${wowTxt(cost,costP)}。${costWow!=null&&costWow>15?'成本增幅偏大，須確認是備料、漲價還是異常採購。':''}`,
    `成本占比上升，可能來自原料漲價、採購量增加或售價偏低；需與收入及庫存一起看。`,
    [ '將進貨節奏對齊銷貨與庫存水位，避免提前囤料墊高當期成本。',
      '對成本占比高的關鍵料件集中議價或尋替代料。',
      '建立標準成本，將實際進價與標準比較，揪出異常。' ]);
  INS['毛利（收入–進貨）']=ins(sevGp,
    `NT$${fmt(gp)}　·　毛利率 ${gm.toFixed(1)}%　·　${wowTxt(gp,gpP)}`,
    `本週毛利（收入−進貨）約 NT$${fmt(gp)}，毛利率 ${gm.toFixed(1)}%，較上週${wowTxt(gp,gpP)}。${gp<0?'本週毛利為負，售價未能覆蓋進貨成本，須立即檢討。':''}此為近似毛利（未含人工／製費），適合看趨勢。`,
    `毛利同時受『售價、進貨成本、產品組合』三者影響，任一惡化都會壓縮毛利。`,
    [ gp<0?'立即檢討虧損訂單的報價與成本，必要時調價或停接。':'守住毛利率，接單以毛利為門檻。',
      '優化產品組合，提高高毛利品項佔比。',
      '若要精算真實毛利，建議導入 BOM 標準成本還原銷貨成本。' ]);
  INS['毛利率']=ins(sevGm,
    `${gm.toFixed(1)}%　·　上週 ${gmP.toFixed(1)}%`,
    `本週毛利率 ${gm.toFixed(1)}%，${gm>=gmP?'較上週持平或上升':`較上週 ${gmP.toFixed(1)}% 下滑 ${(gmP-gm).toFixed(1)} 個百分點`}。毛利率是獲利體質核心，比絕對金額更能反映經營效率。`,
    `毛利率下滑通常代表『成本漲幅快於售價』或『低毛利品項占比變高』。`,
    [ '設定毛利率底線（如低於門檻需主管核准接單）。',
      '定期檢視各客戶／品項毛利率，淘汰長期低毛利交易或重新議價。',
      '將進貨漲價適時反映到售價，維持價差。' ]);
  INS['本週新增應付帳款']=ins('good',
    `NT$${fmt(apNew)}　·　${ap.length} 張應付憑單`,
    `本週新增應付帳款 NT$${fmt(apNew)}（${ap.length} 張憑單），代表對供應商新產生的付款義務，未來將形成現金流出。`,
    `應付來自進貨與費用憑單；到期日集中會在某週造成集中付款壓力。`,
    [ '依憑單預計付款日建立未來 4–8 週付款排程，避免集中爆量。',
      '善用付款條件（帳期）延後現金流出，同時維持供應商信用。',
      '將應付與應收到期日對齊，管理現金缺口。' ]);
  INS['本週已付款']=ins(sevApPay,
    `NT$${fmt(apPaid)}　·　應付淨增 NT$${fmt(apNew-apPaid)}`,
    `本週實際付款 NT$${fmt(apPaid)}，相對新增應付 NT$${fmt(apNew)}，應付餘額淨${apNew-apPaid>=0?'增':'減'} NT$${fmt(Math.abs(apNew-apPaid))}。${apNew>0&&apPaid<apNew*0.2?'本週付款明顯少於新增應付，帳款持續累積。':''}`,
    `付款偏低可暫時保留現金，但長期低於應付增量會讓帳款堆積，影響供應商關係與信用。`,
    [ '在現金允許下按帳期正常付款，維持供應商信用與議價空間。',
      '把握提前付款折扣（若划算）降低採購成本。',
      '監控應付週轉天數，避免帳款異常堆積。' ]);
  INS['現金流方向（收-付）']=ins(sevCash,
    `NT$${fmt(net)}　·　${net>=0?'淨流入':'淨流出'}`,
    `以『本週銷貨收入 − 本週實際付款』粗估，本週營運現金約${net>=0?'淨流入':'淨流出'} NT$${fmt(Math.abs(net))}。${net<0?'本週現金為淨流出，須留意週轉。':'現金部位本週為正。'}（此為簡化口徑，未含實際收款時點與費用）`,
    `現金方向取決於收款速度與付款節奏；即使有毛利，若收款慢、付款快，仍可能週轉吃緊。`,
    [ '加速應收收款（對帳、催收、縮短帳期），讓收入儘快轉為現金。',
      '在不傷供應商關係前提下，付款節奏與收款節奏對齊。',
      '保留足夠週轉金與備援額度，因應集中付款週。' ]);
  INS['收入/成本 比']=ins(rc>=1?'good':'risk',
    `${cost?rc.toFixed(2)+'x':'—'}`,
    `本週收入為進貨成本的 ${cost?rc.toFixed(2):'—'} 倍。此比率 >1 表示售價高於進貨、具獲利空間；越高代表加值能力越強。`,
    `比率下降代表進貨成本相對收入升高，可能是漲價、折讓過多或低價搶單。`,
    [ rc<1?'比率低於 1（賠本），立即檢討售價與成本結構。':'維持合理加成，避免低價競爭侵蝕加值。',
      '針對低比率的客戶／品項重新議價或調整組合。',
      '結合毛利率一起追蹤，作為接單與報價的雙重門檻。' ]);
  const html=`
    <div class="grid kpis">
      ${kpi('營業收入（銷貨未稅）','$'+fmt(rev),delta(rev,revP))}
      ${kpi('進貨成本（未稅）','$'+fmt(cost),delta(cost,costP))}
      ${kpi('毛利（收入–進貨）',`<span class="${gpcls}">$${fmt(gp)}</span>`,delta(gp,gpP))}
      ${kpi('毛利率',gm.toFixed(1)+'%',null,`上週 ${gmP.toFixed(1)}%`)}
    </div>
    <div class="grid kpis" style="margin-top:14px">
      ${kpi('本週新增應付帳款','$'+fmt(apNew),null,ap.length+' 張應付憑單')}
      ${kpi('本週已付款','$'+fmt(apPaid),null,'淨增應付 $'+fmt(apNew-apPaid))}
      ${kpi('現金流方向（收-付）',`<span class="${(rev-apPaid)>=0?'up':'down'}">$${fmt(rev-apPaid)}</span>`,null,'銷貨收入 − 實付')}
      ${kpi('收入/成本 比',cost? (rev/cost).toFixed(2)+'x':'—',null,'>1 表示獲利')}
    </div>
    <div class="row">
      <div class="card"><h3><span class="dot" style="background:var(--accent)"></span>近 12 週 收入 vs 進貨成本</h3>
        ${dualLine(revTrend,costTrend,'#4f8cff','#ffb454')}
        <div class="sub" style="margin-top:6px"><span style="color:#4f8cff">●</span> 收入　<span style="color:#ffb454">●</span> 進貨成本</div></div>
      <div class="card"><h3><span class="dot" style="background:var(--green)"></span>當週財務摘要</h3>
        <table>
          <tr><td>營業收入</td><td class="num">${fmt(rev)}</td></tr>
          <tr><td>進貨成本</td><td class="num">(${fmt(cost)})</td></tr>
          <tr><td><b>毛利</b></td><td class="num ${gpcls}"><b>${fmt(gp)}</b></td></tr>
          <tr><td>毛利率</td><td class="num">${gm.toFixed(1)}%</td></tr>
          <tr><td>新增應付帳款</td><td class="num">${fmt(apNew)}</td></tr>
          <tr><td>本週已付款</td><td class="num">${fmt(apPaid)}</td></tr>
          <tr><td><b>應付淨增</b></td><td class="num"><b>${fmt(apNew-apPaid)}</b></td></tr>
          <tr><td>銷貨單 / 進貨單 / 應付單</td><td class="num">${s.length} / ${p.length} / ${ap.length}</td></tr>
        </table></div>
    </div>`;
  document.getElementById('fin').innerHTML=html;
}

// tabs
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  ['sales','purch','fin'].forEach(id=>document.getElementById(id).classList.add('hide'));
  document.getElementById(t.dataset.t).classList.remove('hide');
});

render();
</script>
</body>
</html>
